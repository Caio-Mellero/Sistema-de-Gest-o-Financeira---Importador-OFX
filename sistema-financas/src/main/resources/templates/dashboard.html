<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Dashboard - Gráficos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" th:href="@{/css/dashboard.css}">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark border-bottom border-secondary mb-4" style="background-color: #16161a;">
    <div class="container">
        <a class="navbar-brand fw-bold" href="#">Minhas Finanças</a>
        <div class="collapse navbar-collapse">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item">
                    <a class="nav-link" href="/">Lançamentos</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link active" href="/dashboard">Gráficos & Análise</a> </li>
            </ul>
        </div>
    </div>
</nav>

<div class="container">

    <h2 class="mb-4 fw-bold">Análise Financeira</h2>

    <div class="row mb-5">
        <div class="col-md-4">
            <div class="card card-dark p-3 text-center">
                <small class="text-secondary">Entradas</small>
                <h3 class="text-success" th:text="${totalEntradasFmt}"></h3>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card card-dark p-3 text-center">
                <small class="text-secondary">Saídas</small>
                <h3 class="text-danger" th:text="${totalSaidasFmt}"></h3>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card card-dark p-3 text-center">
                <small class="text-secondary">Saldo</small>
                <h3 class="text-primary" th:text="${saldoFmt}"></h3>
            </div>
        </div>
    </div>

    <div class="row">
        <div class="col-md-6 offset-md-3">
            <div class="card card-dark h-100">
                <div class="card-body">
                    <h5 class="card-title text-center mb-4">Para onde foi meu dinheiro?</h5>
                    <div style="position: relative; height: 300px;">
                        <canvas id="graficoCategoria"></canvas>
                    </div>
                </div>
            </div>
        </div>
    </div>

</div>

<script th:src="@{/js/dashboard.js}"></script>
<script th:inline="javascript">
    document.addEventListener("DOMContentLoaded", function() {
        // O Thymeleaf preenche as variáveis aqui no HTML
        const nomes = /*[[${graficoNomes}]]*/ [];
        const valores = /*[[${graficoValores}]]*/ [];

        renderizarGraficoDonut(nomes, valores);
    });
</script>

</body>
</html>
